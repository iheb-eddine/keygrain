name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checksum-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify vectors.json checksum
        run: |
          ACTUAL=$(sha256sum vectors.json | cut -d' ' -f1)
          EXPECTED=$(tr -d '[:space:]' < .vectors-checksum)
          [ "$ACTUAL" = "$EXPECTED" ] || { echo "::error::vectors.json checksum mismatch"; exit 1; }
      - name: Verify SPEC.md checksum
        run: |
          ACTUAL=$(sha256sum SPEC.md | cut -d' ' -f1)
          EXPECTED=$(tr -d '[:space:]' < .spec-checksum)
          [ "$ACTUAL" = "$EXPECTED" ] || { echo "::error::SPEC.md checksum mismatch"; exit 1; }

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sh ci/version-check.sh

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e . && pip install pytest && pytest -q
        working-directory: python

  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node test.mjs && node test-popup-modules.mjs
        working-directory: extension/tests

  test-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...
