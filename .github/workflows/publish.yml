name: Publish to PyPI

on:
  release:
    types: [published]

# Default: no permissions. The publish job opts into the minimum it needs.
permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # REQUIRED: mint the OIDC token for PyPI Trusted Publishing
      contents: read    # checkout
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Reproducible wheels: pin zip entry timestamps to the released commit's
      # timestamp so anyone rebuilding from this tag gets a byte-identical wheel.
      - name: Set reproducible build timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Build distribution
        working-directory: python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check distribution metadata
        working-directory: python
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      # Trusted Publishing (OIDC) + PEP 740 attestations.
      # No token/secret: PyPI validates the OIDC identity against the registered
      # publisher (owner=iheb-eddine, repo=keygrain, workflow=publish.yml).
      # Attestations are generated by default and cryptographically bind the
      # uploaded artifacts to this workflow run and commit.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
