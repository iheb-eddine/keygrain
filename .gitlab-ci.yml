stages:
  - test
  - build
  - build-mobile
  - deploy

variables:
  APP_NAME: keygrain
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${APP_NAME}/${CI_COMMIT_REF_SLUG}"

checksum-gate:
  stage: test
  image: alpine:3.19
  script:
    - |
      ACTUAL=$(sha256sum vectors.json | cut -d' ' -f1)
      EXPECTED=$(tr -d '[:space:]' < .vectors-checksum)
      if [ "$ACTUAL" != "$EXPECTED" ]; then
        echo "CHECKSUM MISMATCH: vectors.json"
        echo "  expected: $EXPECTED"
        echo "  actual:   $ACTUAL"
        exit 1
      fi
    - |
      ACTUAL=$(sha256sum SPEC.md | cut -d' ' -f1)
      EXPECTED=$(tr -d '[:space:]' < .spec-checksum)
      if [ "$ACTUAL" != "$EXPECTED" ]; then
        echo "CHECKSUM MISMATCH: SPEC.md"
        echo "  expected: $EXPECTED"
        echo "  actual:   $ACTUAL"
        exit 1
      fi
  rules:
    - if: $CI_COMMIT_BRANCH

test-python:
  stage: test
  image: python:3.11-slim
  script:
    - cd python
    - pip install -e .
    - pip install pytest
    - pytest -q | tee test-output.txt
    - |
      ACTUAL_COUNT=$(grep -oP '^\d+(?= passed)' test-output.txt || true)
      ACTUAL_COUNT=${ACTUAL_COUNT:-0}
      BASELINE=$(grep '^python=' ../.test-baselines | cut -d= -f2)
      if [ "$ACTUAL_COUNT" -lt "$BASELINE" ]; then
        echo "TEST COUNT REGRESSION: python"
        echo "  baseline: $BASELINE"
        echo "  actual:   $ACTUAL_COUNT"
        exit 1
      fi
      echo "Test count OK: python $ACTUAL_COUNT >= $BASELINE"
  rules:
    - if: $CI_COMMIT_BRANCH

test-js:
  stage: test
  image: node:20-alpine
  script:
    - cd extension/tests
    - node test.mjs | tee test-output.txt
    - |
      ACTUAL_COUNT=$(grep -o '^[0-9]* tests:' test-output.txt | grep -o '^[0-9]*' || true)
      ACTUAL_COUNT=${ACTUAL_COUNT:-0}
      BASELINE=$(grep '^js=' ../../.test-baselines | cut -d= -f2)
      if [ "$ACTUAL_COUNT" -lt "$BASELINE" ]; then
        echo "TEST COUNT REGRESSION: js"
        echo "  baseline: $BASELINE"
        echo "  actual:   $ACTUAL_COUNT"
        exit 1
      fi
      echo "Test count OK: js $ACTUAL_COUNT >= $BASELINE"
  rules:
    - if: $CI_COMMIT_BRANCH

test-js-slow:
  stage: test
  image: node:20-alpine
  script:
    - cd extension/tests
    - node test-strengthen-slow.mjs
  timeout: 2m
  rules:
    - if: $CI_COMMIT_BRANCH

test-cross-platform:
  stage: test
  image: node:20
  script:
    - apt-get update && apt-get install -y python3 python3-pip python3-venv
    - pip install --break-system-packages ./python
    - bash ci/cross-platform-check.sh
  timeout: 2m
  rules:
    - if: $CI_COMMIT_BRANCH

test-go:
  stage: test
  image: golang:1.22-alpine
  script:
    - cd server
    - go test -v ./... 2>&1 | tee test-output.txt
    - |
      ACTUAL_COUNT=$(grep -c "^--- PASS:" test-output.txt || true)
      ACTUAL_COUNT=${ACTUAL_COUNT:-0}
      BASELINE=$(grep '^go=' ../.test-baselines | cut -d= -f2)
      if [ "$ACTUAL_COUNT" -lt "$BASELINE" ]; then
        echo "TEST COUNT REGRESSION: go"
        echo "  baseline: $BASELINE"
        echo "  actual:   $ACTUAL_COUNT"
        exit 1
      fi
      echo "Test count OK: go $ACTUAL_COUNT >= $BASELINE"
  rules:
    - if: $CI_COMMIT_BRANCH

build-extension:
  stage: build
  image: alpine:3.19
  script:
    - apk add --no-cache bash zip
    - cd extension
    - bash build.sh
  artifacts:
    paths:
      - extension/dist/keygrain-chrome.zip
      - extension/dist/keygrain-firefox.zip
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH

build-package:
  stage: build
  image: golang:1.22-alpine
  script:
    - apk add --no-cache tar curl
    - mkdir -p build/app
    - cd server
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../build/app/keygrain-server .
    - cp -r static ../build/app/
    - cp Dockerfile ../build/app/
    - cp docker-compose.yml ../build/app/
    - cp go.mod ../build/app/
    - cp go.sum ../build/app/ 2>/dev/null || true
    - cp *.go ../build/app/
    - cp -r deploy ../build/app/
    - cd ../build && tar -czf ../${APP_NAME}.tar.gz app
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file ../${APP_NAME}.tar.gz \
           "${PACKAGE_REGISTRY_URL}/${APP_NAME}.tar.gz"
  artifacts:
    paths:
      - ${APP_NAME}.tar.gz
    expire_in: 1 week
  only:
    - master

build-mobile:
  stage: build-mobile
  image: eclipse-temurin:17-jdk
  variables:
    ANDROID_HOME: "/opt/android-sdk"
    GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2048m"
  script:
    - apt-get update && apt-get install -y wget unzip
    - mkdir -p $ANDROID_HOME/cmdline-tools
    - wget -q -O /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
    - unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
    - mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
    - rm /tmp/cmdline-tools.zip
    - yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
    - $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"
    - cd kotlin
    - chmod +x gradlew
    - |
      if [ -n "$RELEASE_KEYSTORE" ]; then
        if [ -f "$RELEASE_KEYSTORE" ]; then
          cp "$RELEASE_KEYSTORE" release.keystore
        else
          printf '%s' "$RELEASE_KEYSTORE" | tr -d '\n\r ' | base64 -d > release.keystore
        fi
      fi
    - 'sed -i "s/versionName = \"1.0.0\"/versionName = \"1.0.0-${CI_COMMIT_SHORT_SHA}\"/" app/build.gradle.kts'
    - ./gradlew testReleaseUnitTest --no-daemon --max-workers=1
    - |
      ACTUAL_COUNT=$(find app/build/test-results/testReleaseUnitTest -name "*.xml" -exec grep -c "<testcase" {} + | awk -F: '{sum+=$NF} END {print sum}')
      ACTUAL_COUNT=${ACTUAL_COUNT:-0}
      BASELINE=$(grep '^kotlin=' ../.test-baselines | cut -d= -f2)
      if [ "$ACTUAL_COUNT" -lt "$BASELINE" ]; then
        echo "TEST COUNT REGRESSION: kotlin"
        echo "  baseline: $BASELINE"
        echo "  actual:   $ACTUAL_COUNT"
        exit 1
      fi
      echo "Test count OK: kotlin $ACTUAL_COUNT >= $BASELINE"
    - ./gradlew assembleRelease --no-daemon --max-workers=1
    - cp app/build/outputs/apk/release/app-release.apk keygrain.apk || cp app/build/outputs/apk/release/app-release-unsigned.apk keygrain.apk
  artifacts:
    paths:
      - kotlin/keygrain.apk
    expire_in: 2 weeks
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH
      changes:
        - kotlin/**/*

deploy:
  stage: deploy
  image: debian:bullseye
  needs:
    - build-package
    - job: build-mobile
      optional: true
      artifacts: true
  before_script:
    - apt-get update && apt-get install -y openssh-client curl bash
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --output ${APP_NAME}.tar.gz \
           "${PACKAGE_REGISTRY_URL}/${APP_NAME}.tar.gz"
    - scp ${APP_NAME}.tar.gz ${SERVER_USER}@${SERVER_IP}:/tmp/${APP_NAME}.tar.gz
    - scp server/deploy/setup-server.sh ${SERVER_USER}@${SERVER_IP}:/tmp/keygrain-setup.sh
    - scp server/deploy/deploy.sh ${SERVER_USER}@${SERVER_IP}:/tmp/keygrain-deploy.sh
    - ssh ${SERVER_USER}@${SERVER_IP} "chmod +x /tmp/keygrain-setup.sh /tmp/keygrain-deploy.sh && DOMAIN=keygrain.com /tmp/keygrain-setup.sh && /tmp/keygrain-deploy.sh"
    - |
      if [ -f kotlin/keygrain.apk ]; then
        scp kotlin/keygrain.apk ${SERVER_USER}@${SERVER_IP}:/opt/keygrain/static/app/keygrain.apk
        echo "APK deployed"
      fi
    - ssh ${SERVER_USER}@${SERVER_IP} "docker ps | grep keygrain"
  environment:
    name: production
    url: https://keygrain.com
  only:
    - master
