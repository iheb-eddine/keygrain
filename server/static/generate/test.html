<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keygrain — Test Vectors</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #333; }
        h1 { font-size: 2rem; }
        #summary { font-size: 1.2rem; margin-bottom: 1rem; }
        .pass { color: #2a2; }
        .fail { color: #c22; }
        .vector { margin: 0.5rem 0; padding: 8px; background: #f4f4f4; border-radius: 3px; font-size: 0.85rem; }
        .vector code { font-family: monospace; }
    </style>
</head>
<body>
    <h1>Keygrain — Test Vectors</h1>
    <div id="summary">Running...</div>
    <div id="results"></div>
    <script>
    const UPPER = "ABCDEFGHJKLMNPQRSTUVWXYZ";
    const LOWER = "abcdefghjkmnpqrstuvwxyz";
    const DIGITS = "23456789";

    async function hmacSHA256(key, message) {
        const k = await crypto.subtle.importKey("raw", key, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
        const sig = await crypto.subtle.sign("HMAC", k, message);
        return new Uint8Array(sig);
    }

    async function buildStream(secret, message, needed) {
        const enc = new TextEncoder();
        const key = await hmacSHA256(enc.encode(secret), message);
        let stream = new Uint8Array(key);
        let counter = 1;
        while (stream.length < needed) {
            const ext = await hmacSHA256(key, new Uint8Array([counter]));
            const combined = new Uint8Array(stream.length + ext.length);
            combined.set(stream);
            combined.set(ext, stream.length);
            stream = combined;
            counter++;
        }
        return stream;
    }

    async function derivePassword(secret, email, site, length, symbols, salt, counter) {
        const enc = new TextEncoder();
        const message = enc.encode(site.toLowerCase() + ":" + email.toLowerCase() + ":" + length + ":" + salt + ":" + counter);
        const stream = await buildStream(secret, message, length * 2);
        const fullCharset = UPPER + LOWER + DIGITS + symbols;
        let pos = 0;
        const nextByte = () => stream[pos++];

        const chars = [
            UPPER[nextByte() % UPPER.length],
            LOWER[nextByte() % LOWER.length],
            DIGITS[nextByte() % DIGITS.length],
            symbols[nextByte() % symbols.length],
        ];
        for (let i = 0; i < length - 4; i++) {
            chars.push(fullCharset[nextByte() % fullCharset.length]);
        }
        for (let i = length - 1; i > 0; i--) {
            const j = nextByte() % (i + 1);
            [chars[i], chars[j]] = [chars[j], chars[i]];
        }
        return chars.join("");
    }

    const VECTORS = [
        { secret: "my-master-secret", site: "github.com", email: "test@gmail.com", length: 20, symbols: "!@#$%&*-_=+?", salt: "", counter: 1, expected: "KujJv2ExLBw8ffyHq*sh" },
        { secret: "my-master-secret", site: "google.com", email: "test@gmail.com", length: 20, symbols: "!@#$%&*-_=+?", salt: "", counter: 1, expected: "+m_VEJe6WNzMS5EC48KL" },
        { secret: "my-master-secret", site: "GitHub.com", email: "test@gmail.com", length: 20, symbols: "!@#$%&*-_=+?", salt: "", counter: 1, expected: "KujJv2ExLBw8ffyHq*sh" },
        { secret: "my-master-secret", site: "github.com", email: "TEST@Gmail.com", length: 20, symbols: "!@#$%&*-_=+?", salt: "", counter: 1, expected: "KujJv2ExLBw8ffyHq*sh" },
        { secret: "my-master-secret", site: "github.com", email: "test@gmail.com", length: 16, symbols: "!@#$%&*-_=+?", salt: "", counter: 1, expected: "%p=p7JztpZFg=&5R" },
        { secret: "my-master-secret", site: "github.com", email: "test@gmail.com", length: 20, symbols: "!@#$%&", salt: "", counter: 1, expected: "R%jJ92LBeP!Eu2#Pw!6w" },
        { secret: "my-master-secret", site: "github.com", email: "test@gmail.com", length: 20, symbols: "!@#$%&*-_=+?", salt: "2024", counter: 1, expected: "GWX93CFV7h9#t9x2fY86" },
        { secret: "my-master-secret", site: "github.com", email: "test@gmail.com", length: 20, symbols: "!@#$%&*-_=+?", salt: "", counter: 2, expected: "L#d-TVKKQ4Ag56E#L9xD" },
        { secret: "different-secret", site: "github.com", email: "test@gmail.com", length: 20, symbols: "!@#$%&*-_=+?", salt: "", counter: 1, expected: "kvNCRWH9St+ybaj=v*sT" },
        { secret: "my-master-secret", site: "home-wifi", email: "test@gmail.com", length: 20, symbols: "!@#$%&*-_=+?", salt: "", counter: 1, expected: "ae-vwmGH9qT!H-wRJ4Tm" },
    ];

    async function runTests() {
        const results = document.getElementById("results");
        const summary = document.getElementById("summary");
        let passed = 0;
        for (let i = 0; i < VECTORS.length; i++) {
            const v = VECTORS[i];
            const actual = await derivePassword(v.secret, v.email, v.site, v.length, v.symbols, v.salt, v.counter);
            const ok = actual === v.expected;
            if (ok) passed++;
            const div = document.createElement("div");
            div.className = "vector " + (ok ? "pass" : "fail");
            div.innerHTML = ok
                ? `&#x2705; Vector ${i + 1}: <code>${v.site}</code> ${v.email} len=${v.length} salt="${v.salt}" counter=${v.counter}`
                : `&#x274C; Vector ${i + 1}: <code>${v.site}</code> ${v.email} len=${v.length} salt="${v.salt}" counter=${v.counter}<br>Expected: <code>${v.expected}</code><br>Got: <code>${actual}</code>`;
            results.appendChild(div);
        }
        summary.className = passed === VECTORS.length ? "pass" : "fail";
        summary.textContent = `${passed}/${VECTORS.length} vectors passed`;
    }
    runTests();
    </script>
</body>
</html>
