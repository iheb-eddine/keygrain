<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keygrain — Generate Password</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #333; }
        h1 { font-size: 2rem; }
        label { display: block; margin-top: 1rem; color: #555; font-size: 0.9rem; }
        input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 1rem; box-sizing: border-box; }
        input:focus { outline: none; border-color: #666; }
        button { padding: 10px 20px; font-size: 1rem; border: none; border-radius: 3px; cursor: pointer; }
        #generate { margin-top: 1.5rem; background: #333; color: #fff; }
        #generate:hover { background: #555; }
        #generate:disabled { background: #999; cursor: wait; }
        .output-row { display: flex; gap: 8px; margin-top: 1.5rem; align-items: center; }
        .output-row input { flex: 1; font-family: monospace; background: #f4f4f4; }
        #copy { background: #f4f4f4; border: 1px solid #ccc; font-size: 1.2rem; padding: 8px 12px; }
        #copy:hover { background: #e0e0e0; }
        #status { margin-top: 0.5rem; color: #555; font-size: 0.85rem; min-height: 1.2em; }
        #fingerprint { display: flex; gap: 6px; margin-top: 6px; min-height: 12px; }
        .fp-dot { width: 12px; height: 12px; border-radius: 50%; }
        details summary { cursor: pointer; font-size: 0.9rem; margin-top: 1rem; color: #555; list-style: none; }
        details summary::-webkit-details-marker { display: none; }
        details .details-content { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 200ms ease; overflow: hidden; }
        details[open] .details-content { grid-template-rows: 1fr; }
        details .details-content > div { overflow: hidden; }
        @media (prefers-reduced-motion: reduce) { details .details-content { transition: none; } }
    </style>
</head>
<body>
    <h1>Keygrain — Generate Password</h1>
    <form id="form">
        <label for="secret">Secret</label>
        <input type="password" id="secret" autocomplete="off" required>
        <div id="fingerprint" aria-label="Secret fingerprint"></div>
        <label for="site">Site</label>
        <input type="text" id="site" autocomplete="off" required>
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="off" required>
        <details id="options-panel">
            <summary>⚙️ Options</summary>
            <div class="details-content"><div>
                <label for="length">Length</label>
                <input type="number" id="length" min="8" value="20">
                <label for="symbols">Symbols</label>
                <input type="text" id="symbols" value="!@#$%&*-_=+?">
                <label for="counter">Counter</label>
                <input type="number" id="counter" min="1" value="1">
            </div></div>
        </details>
        <button type="submit" id="generate">Generate</button>
    </form>
    <div class="output-row">
        <input type="text" id="output" readonly aria-label="Generated password">
        <button type="button" id="copy" title="Copy to clipboard">&#x1F4CB;</button>
    </div>
    <div id="status" aria-live="polite"></div>
    <script src="./hash-wasm-argon2.js"></script>
    <script>
    const UPPER = "ABCDEFGHJKLMNPQRSTUVWXYZ";
    const LOWER = "abcdefghjkmnpqrstuvwxyz";
    const DIGITS = "23456789";

    const MESSAGES = {
      LENGTH_MIN: "Password length must be at least 8 characters.",
      SYMBOLS_REQUIRED: "At least one symbol character is required.",
      COPIED: "Copied! Clipboard clears in 30 seconds.",
      CLIPBOARD_CLEARED: "Clipboard cleared.",
    };

    async function hmacSHA256(key, message) {
        const k = await crypto.subtle.importKey("raw", key, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
        const sig = await crypto.subtle.sign("HMAC", k, message);
        return new Uint8Array(sig);
    }

    async function strengthen(secret, email) {
        const enc = new TextEncoder();
        const result = await hashwasm.argon2id({
            password: enc.encode(secret),
            salt: enc.encode("keygrain-strengthen:" + email.toLowerCase()),
            parallelism: 1,
            iterations: 3,
            memorySize: 65536,
            hashLength: 32,
            outputType: "binary",
        });
        return new Uint8Array(result);
    }

    async function buildStream(strengthened, message, needed) {
        const key = await hmacSHA256(strengthened, message);
        let stream = new Uint8Array(key);
        let counter = 1;
        while (stream.length < needed) {
            const ext = await hmacSHA256(key, new Uint8Array([counter]));
            const combined = new Uint8Array(stream.length + ext.length);
            combined.set(stream);
            combined.set(ext, stream.length);
            stream = combined;
            counter++;
        }
        return stream;
    }

    async function derivePassword(secret, email, site, length, symbols, counter) {
        const enc = new TextEncoder();
        const strengthened = await strengthen(secret, email);
        const message = enc.encode(site.toLowerCase() + ":" + email.toLowerCase() + ":" + length + ":" + counter);
        const stream = await buildStream(strengthened, message, length * 2);
        const fullCharset = UPPER + LOWER + DIGITS + symbols;
        let pos = 0;
        const nextByte = () => stream[pos++];

        const chars = [
            UPPER[nextByte() % UPPER.length],
            LOWER[nextByte() % LOWER.length],
            DIGITS[nextByte() % DIGITS.length],
            symbols[nextByte() % symbols.length],
        ];
        for (let i = 0; i < length - 4; i++) {
            chars.push(fullCharset[nextByte() % fullCharset.length]);
        }
        for (let i = length - 1; i > 0; i--) {
            const j = nextByte() % (i + 1);
            [chars[i], chars[j]] = [chars[j], chars[i]];
        }
        return chars.join("");
    }

    let clearTimer = null;
    const form = document.getElementById("form");
    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const copyBtn = document.getElementById("copy");
    const secretInput = document.getElementById("secret");
    const fpContainer = document.getElementById("fingerprint");
    const optionsPanel = document.getElementById("options-panel");

    optionsPanel.addEventListener("toggle", () => {
      optionsPanel.querySelector("summary").textContent = optionsPanel.open ? "⚙️ Hide options" : "⚙️ Options";
    });

    const WONG_PALETTE = ["#000000","#E69F00","#56B4E9","#009E73","#F0E442","#0072B2","#D55E00","#CC79A7"];

    async function secretFingerprint(secret, email) {
      const enc = new TextEncoder();
      const strengthened = await strengthen(secret, email);
      const hash = await hmacSHA256(strengthened, enc.encode("keygrain-fingerprint"));
      return Array.from(hash.slice(0, 4), b => b % 8);
    }

    let fpTimer = null;
    function triggerFingerprint() {
      if (fpTimer) clearTimeout(fpTimer);
      const secret = secretInput.value;
      const email = document.getElementById("email").value;
      if (!secret || !email) { fpContainer.innerHTML = ""; return; }
      fpTimer = setTimeout(async () => {
        const indices = await secretFingerprint(secret, email);
        fpContainer.innerHTML = indices.map(i => `<span class="fp-dot" style="background:${WONG_PALETTE[i]}"></span>`).join("");
      }, 500);
    }
    secretInput.addEventListener("input", triggerFingerprint);
    document.getElementById("email").addEventListener("input", triggerFingerprint);

    function normalizeSite(site) {
      return site.replace(/^https?:\/\//i, '').split('/')[0].split('?')[0].split('#')[0].replace(/\/$/, '').toLowerCase().replace(/^www\./, '');
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const secret = document.getElementById("secret").value;
        const site = normalizeSite(document.getElementById("site").value);
        const email = document.getElementById("email").value;
        const length = parseInt(document.getElementById("length").value, 10);
        const symbols = document.getElementById("symbols").value;
        const counter = parseInt(document.getElementById("counter").value, 10) || 1;
        if (!site) { status.textContent = "Site is required."; return; }
        if (length < 8) { status.textContent = MESSAGES.LENGTH_MIN; return; }
        if (!symbols) { status.textContent = MESSAGES.SYMBOLS_REQUIRED; return; }
        const btn = document.getElementById("generate");
        btn.disabled = true;
        status.textContent = "Strengthening key…";
        try {
            output.value = await derivePassword(secret, email, site, length, symbols, counter);
            status.textContent = "";
        } catch (err) {
            status.textContent = "Error: " + err.message;
        } finally {
            btn.disabled = false;
        }
    });

    copyBtn.addEventListener("click", async () => {
        if (!output.value) return;
        await navigator.clipboard.writeText(output.value);
        status.textContent = MESSAGES.COPIED;
        setTimeout(() => { if (status.textContent === MESSAGES.COPIED) status.textContent = ""; }, 2000);
        if (clearTimer) clearTimeout(clearTimer);
        clearTimer = setTimeout(async () => {
            await navigator.clipboard.writeText("");
            status.textContent = MESSAGES.CLIPBOARD_CLEARED;
            setTimeout(() => { if (status.textContent === MESSAGES.CLIPBOARD_CLEARED) status.textContent = ""; }, 2000);
        }, 30000);
    });
    </script>
    <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js")</script>
</body>
</html>
