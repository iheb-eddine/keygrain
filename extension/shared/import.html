<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keygrain Import</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; color: #222; }
    h1 { font-size: 1.2rem; }
    input[type="file"] { margin: 16px 0; }
    #status { margin-top: 12px; font-size: 0.9rem; color: #555; }
    .error { color: #c00; }
    .success { color: #090; }
    button { margin-top: 12px; padding: 8px 16px; background: #333; color: #fff; border: none; border-radius: 3px; cursor: pointer; }
    button:hover { background: #555; }
  </style>
</head>
<body>
  <h1>🔑 Keygrain — Import</h1>
  <p>Select an encrypted backup file (.keygrain) to import.</p>
  <input type="file" id="file-input" accept=".keygrain,application/octet-stream">
  <div id="confirm-section" style="display:none;">
    <p id="confirm-msg"></p>
    <button id="confirm-btn">Confirm Import</button>
  </div>
  <div id="status"></div>
  <script src="keygrain.js"></script>
  <script src="sync.js"></script>
  <script src="import.js"></script>
</body>
</html>
